name: Fix blocklist integrity

on:
  schedule:
    # Run weekly at 23:00 on Saturday
    - cron: '0 23 * * 6'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  verify:
    if: github.repository == 'disposable-email-domains/disposable-email-domains'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Verify blocklist
        id: verify
        run: |
          if ! python verify.py; then
            echo "has_diff=true" >> $GITHUB_OUTPUT
          else
            echo "has_diff=false" >> $GITHUB_OUTPUT
          fi
      - name: Fix and commit if changes
        if: steps.verify.outputs.has_diff == 'true'
        run: |
          python verify.py --fix
          git config user.name "dispoBot"
          git config user.email "martenson@dispobot"
          git add disposable_email_blocklist.conf
          git commit -m "Auto-fix blocklist formatting and validity"
      - name: Create Pull Request
        if: steps.verify.outputs.has_diff == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: update-blocklist-verification
          committer: dispoBot <martenson@dispobot>
          commit-message: Auto-fix blocklist formatting and validity
          title: Fix blocklist integrity issues
          body: |
            The `verify.py` script detected issues in the blocklist that need to be fixed.
            This PR was automatically created after running `verify.py --fix`.
          labels: automated
          assignees: martenson
          reviewers: martenson
